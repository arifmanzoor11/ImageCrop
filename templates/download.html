<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Processed Images</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
  <style>
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
      padding: 1.5rem;
    }

    .image-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 15px rgba(0,0,0,0.1);
      transition: transform 0.2s;
      overflow: hidden;
    }

    .image-card:hover {
      transform: translateY(-5px);
    }

    .image-preview {
      width: 100%;
      height: 200px;
      object-fit: contain;
      background: #f8f9fa;
      padding: 1rem;
    }

    .image-info {
      padding: 1rem;
    }

    .filename {
      font-size: 0.9rem;
      color: #6c757d;
      margin-bottom: 0.5rem;
      word-break: break-all;
    }

    .download-btn {
      width: 100%;
      padding: 0.5rem;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      transition: background 0.2s;
    }

    .download-btn:hover {
      background: #218838;
    }

    .download-all {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 1rem 2rem;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      z-index: 1000;
      transition: transform 0.2s;
    }

    .download-all:hover {
      transform: scale(1.05);
      background: #0056b3;
    }

    .header {
      background: linear-gradient(135deg, #007bff, #00c6ff);
      color: white;
      padding: 2rem 1.5rem;
      margin-bottom: 1rem;
      text-align: center;
    }

    @media (max-width: 768px) {
      .image-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1rem;
        padding: 1rem;
      }
    }
  </style>
</head>
<body class="bg-light">
  <div class="header">
    <h1 class="display-4">Your Processed Images</h1>
    <p class="lead mb-0">Download your images individually or all at once</p>
  </div>

  <div class="container-fluid">
    <div class="image-grid">
      {% for file in files %}
      <div class="image-card">
        <img src="{{ url_for('download_file', filename=file) }}" alt="{{ file }}" class="image-preview">
        <div class="image-info">
          <p class="filename">{{ file }}</p>
          <a href="{{ url_for('download_file', filename=file) }}" download class="download-btn btn">
            <i class="fas fa-download"></i> Download
          </a>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

  <form action="{{ url_for('download_all') }}" method="post">
    <button type="submit" class="download-all">
      <i class="fas fa-file-archive"></i> Download All as ZIP
    </button>
  </form>

  <script src="https://kit.fontawesome.com/your-font-awesome-kit.js"></script>
</body>
</html>
