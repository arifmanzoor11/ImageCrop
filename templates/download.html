<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Processed Images</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Optional: Center spinner in modal */
    #modalLoader {
      margin: auto;
    }
  </style>
</head>
<body class="container mt-5">

  <h2 class="text-center">Download Your Processed Images</h2>

  <ul class="list-group mt-4">
    {% for file in files %}
      <li class="list-group-item text-center">
        <img src="{{ url_for('download_file', filename=file) }}" class="img-thumbnail" style="max-width: 200px;">
        <div class="mt-2">
          <a href="{{ url_for('download_file', filename=file) }}" download class="btn btn-success">Download</a>
          <!-- View button triggers modal and passes the image URL -->
          <button class="btn btn-info" data-bs-toggle="modal" data-bs-target="#imageModal" data-image="{{ url_for('download_file', filename=file) }}">View</button>
        </div>
      </li>
    {% endfor %}
  </ul>

  <div class="mt-3 text-center">
    <a href="{{ url_for('download_all') }}" class="btn btn-primary">Download All as ZIP</a>
  </div>

  <div class="mt-3 text-center">
    <a href="/" class="btn btn-secondary">Process More Images</a>
  </div>

  <!-- Bootstrap Modal for Image Viewer with Loader -->
  <div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="imageModalLabel">Image Viewer</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-center position-relative">
          <!-- Loader spinner displayed until image loads -->
          <div id="modalLoader" class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <!-- The image is initially hidden with the d-none class -->
          <img id="modalImage" src="" class="img-fluid d-none" alt="Processed Image">
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    var imageModal = document.getElementById('imageModal');
    imageModal.addEventListener('show.bs.modal', function (event) {
      var button = event.relatedTarget;
      var imageSrc = button.getAttribute('data-image');
      var modalImage = document.getElementById('modalImage');
      var modalLoader = document.getElementById('modalLoader');
      
      // Hide image and show loader until image is fully loaded
      modalImage.classList.add('d-none');
      modalLoader.style.display = 'block';
      
      modalImage.src = imageSrc;
      
      // When the image loads, hide the loader and show the image
      modalImage.onload = function () {
        modalLoader.style.display = 'none';
        modalImage.classList.remove('d-none');
      };
    });
  </script>
</body>
</html>
