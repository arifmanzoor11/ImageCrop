<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Processed Images</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h2 class="text-center">Download Processed Images</h2>

    <ul class="list-group mt-4">
        {% for file in files %}
            <li class="list-group-item">
                <img src="{{ url_for('download_file', filename=file) }}" >
                <a href="{{ url_for('download_file', filename=file) }}" class="btn btn-success">Download {{ file }}</a>
            </li>
        {% endfor %}
    </ul>

    <div class="mt-3">
        <a href="{{ url_for('download_all') }}" class="btn btn-primary">Download All as ZIP</a>
    </div>

    <div class="mt-3">
        <a href="/" class="btn btn-secondary">Process More Images</a>
    </div>

</body>
</html>
