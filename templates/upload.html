<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Cropper & Preview</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Optional: Style for preview container */
    #imagePreview img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body class="container mt-5">
  <h2 class="text-center">Upload Image for Cropping</h2>
  
  <form id="uploadForm" action="/" method="post" enctype="multipart/form-data" class="mt-4">
    <div class="mb-3">
      <label for="file" class="form-label">Select Images</label>
      <input type="file" class="form-control" name="file" multiple required id="fileInput">
    </div>
    
    <!-- Image Preview Container -->
    <div id="imagePreview" class="row"></div>
    
    <div class="row mt-3 mb-3">
      <div class="col-md-6">
        <label for="width" class="form-label">Width:</label>
        <input type="number" class="form-control" name="width" value="300" required>
      </div>
      <div class="col-md-6">
        <label for="height" class="form-label">Height:</label>
        <input type="number" class="form-control" name="height" value="300" required>
      </div>
    </div>

    <div class="row mt-3 mb-3">
        <div class="col-md-6">
            <div class="mb-3">
                <label for="format" class="form-label">Format:</label>
                <select class="form-select" name="format">
                  <option value="PNG">PNG</option>
                  <option value="JPEG">JPEG</option>
                  <option value="BMP">BMP</option>
                  <option value="GIF">GIF</option>
                  <option value="TIFF">TIFF</option>
                  <option value="ICO">ICO</option>
                  <option value="WEBP">WebP</option>
                  <option value="PPM">PPM</option>
                  <option value="TGA">TGA</option>
                </select>
              </div>
              
        </div>
        <div class="col-md-6">
            <div class="mb-3">
                <label for="mode" class="form-label">Resize Mode:</label>
                <select class="form-select" name="mode">
                  <option value="Cover">Cover</option>
                  <option value="Stretch">Stretch</option>
                </select>
              </div>
        </div>
    </div>
    <button type="submit" class="btn btn-primary">Upload & Process</button>
  </form>

  <!-- JavaScript: Show preview images upon file selection -->
  <script>
    document.getElementById('fileInput').addEventListener('change', function () {
      const previewContainer = document.getElementById('imagePreview');
      previewContainer.innerHTML = ''; // Clear previous previews
      
      const files = this.files;
      if (files) {
        Array.from(files).forEach(file => {
          const reader = new FileReader();
          reader.onload = function (e) {
            const colDiv = document.createElement('div');
            colDiv.className = 'col-md-3 mt-3';
            const img = document.createElement('img');
            img.src = e.target.result;
            img.className = 'img-thumbnail';
            colDiv.appendChild(img);
            previewContainer.appendChild(colDiv);
          };
          reader.readAsDataURL(file);
        });
      }
    });
  </script>
</body>
</html>
